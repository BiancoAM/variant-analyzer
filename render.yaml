services:
  - type: web
    name: variant-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NCBI_EMAIL
        sync: false
      - key: NCBI_API_KEY
        sync: false
